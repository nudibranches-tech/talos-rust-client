name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: |
            Release ${{ steps.get_version.outputs.version }}
            
            See [CHANGELOG.md](https://github.com/nuditech/talos-rust-client/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify version matches
        run: |
          CARGO_VERSION="v$(cargo pkgid | cut -d# -f2 | cut -d: -f2)"
          TAG_VERSION="${{ needs.create-release.outputs.version }}"
          
          if [[ "${CARGO_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "Error: Cargo.toml version (${CARGO_VERSION}) doesn't match tag (${TAG_VERSION})"
            exit 1
          fi
          
          echo "Version matches: ${CARGO_VERSION}"

      - name: Run tests
        run: cargo test --all-features

      - name: Publish to crates.io
        run: cargo publish --all-features --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: talos-rust-client-linux-amd64
          - target: x86_64-unknown-linux-musl
            artifact_name: talos-rust-client-linux-musl-amd64
          - target: aarch64-unknown-linux-gnu
            artifact_name: talos-rust-client-linux-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            sudo apt-get update && sudo apt-get install -y musl-tools
          elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build examples
        run: |
          cargo build --release --all-features --target ${{ matrix.target }} --examples
          
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          
          # Copy examples
          cp target/${{ matrix.target }}/release/examples/version artifacts/ || true
          cp target/${{ matrix.target }}/release/examples/health artifacts/ || true
          cp target/${{ matrix.target }}/release/examples/events artifacts/ || true
          cp target/${{ matrix.target }}/release/examples/talosconfig_connect artifacts/ || true
          
          # Add README and LICENSE files
          cp README.md artifacts/
          cp LICENSE-* artifacts/
          
          # Create archive
          cd artifacts
          tar czf ../${{ matrix.artifact_name }}.tar.gz *

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.artifact_name }}.tar.gz
          asset_name: ${{ matrix.artifact_name }}.tar.gz
          asset_content_type: application/gzip

  docs-rs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: publish-crate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Trigger docs.rs build
        run: |
          echo "Documentation will be automatically built by docs.rs"
          echo "Visit https://docs.rs/talos-rust-client after a few minutes"